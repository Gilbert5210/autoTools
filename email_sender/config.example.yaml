# 复制本文件为 `config.yaml` 后，再填写你的真实参数。
# 这是示例模板：结构与当前项目最新配置保持一致，但账号、邮箱、手机号等均为占位值。

runtime:
  # 每批发送多少封邮件。
  batch_size: 10

  # 每批发送完成后的基础等待时间（秒）。
  batch_interval_seconds: 10

  # 批次等待抖动（秒），实际等待会在 ± 该值范围内浮动。
  batch_interval_jitter_seconds: 3

  # 每封邮件之间的基础等待时间（秒）。
  per_email_delay_seconds: 2

  # 单封间隔抖动（秒），避免固定节奏发送。
  per_email_delay_jitter_seconds: 2

  # SMTP 连接超时时间（秒）。
  smtp_timeout_seconds: 25

  # SMTP 瞬时错误重试次数。
  smtp_retry_count: 2

  # SMTP 重试退避基础时长（秒）。
  smtp_retry_backoff_seconds: 3

  # 连续失败达到该阈值时，触发一次冷却暂停。
  failure_pause_threshold: 3

  # 冷却暂停时长（秒）。
  failure_pause_seconds: 120

  # 可选随机种子；测试时可填固定数字，线上一般留空。
  random_seed:

  # true 表示仅演练，不真正发信。
  dry_run: false

  # 报告输出目录。
  report_dir: "./reports"

  # true 表示跳过无效邮箱地址，不因单条脏数据中断。
  skip_invalid_recipient_email: true

senders:
  # 可配置多个发件账号，脚本会按顺序轮换发送。
  - id: "sender_a"

    # 发件人显示名称。
    from_name: "论文服务顾问A"

    # 发件邮箱。
    email: "sender_a@your-company.com"

    # 发件邮箱密码 / 授权码。
    password: "your_smtp_password"

    # SMTP 服务器地址。
    smtp_host: "smtp.exmail.qq.com"

    # SMTP 端口。
    smtp_port: 587

    # 是否使用 SSL。
    use_ssl: false

    # 是否使用 STARTTLS。
    use_tls: true

recipients:
  # 收件人文件，支持 .csv / .tsv / .txt。
  file: "./recipients.csv"

  # 收件人邮箱字段名。
  email_field: "email"

  # 模板字段名；当 templates.selection=by_recipient_field 时生效。
  template_id_field: "template_id"

templates:
  # 模板选择方式：
  # by_recipient_field = 按收件人行里的 template_id 选择模板
  # round_robin = 按模板列表轮流发送
  selection: "by_recipient_field"

  # 当收件人没有 template_id 时，默认使用的模板。
  default_template_id: "intro"

  items:
    - id: "intro"
      # 说明：现在标题会优先由 AI 动态生成。
      # 这里的 subject_template 主要作为“风格参考 + AI失败时的兜底标题”。
      subject_template: "{name}医生，想和您分享一份论文润色与投稿经验"

      # 说明：这里的 prompt_template 是核心提示词。
      # AI 会基于它动态生成“标题 + 正文”。
      prompt_template: |
        请你以“医学论文辅助与润色顾问”的身份，写一封发给医院医生的中文开发邮件正文。
        收件人姓名：{name}
        所在单位：{company}
        职位：{title}
        研究方向/学科关键词：{industry}
        我方联系人：{sender_name} (13800000000（V:your_wechat）)

        写作目标：
        - 让医生感受到我们是真诚、专业、值得信任的论文辅助伙伴；
        - 让对方愿意进一步咨询，并主动加微信或电话沟通；
        - 语气要亲切自然，像同行间认真交流，而不是生硬推销。
        - 即使资料字段不完整，也要写得自然、得体，不能出现生硬空缺感。

        核心内容（必须覆盖）：
        - 先表达对对方所在方向科研工作的尊重与关注，开头要自然；
        - 点出医生常见痛点，如论文表达不够学术、逻辑结构不清、返修回复困难、选刊拿不准、审稿周期过长等；
        - 明确说明我们能提供的帮助，包括论文润色、结构梳理、投稿材料优化、审稿意见回复辅助；
        - 可自然带入一个真实感较强的小案例：某位同级别医院医生的稿件在润色和修回后顺利推进投稿；
        - 结尾温和邀请对方，如近期有初稿、返修稿、积压数据或选刊问题，欢迎加微信或电话沟通，我们可以先免费交流思路。

        字段缺失时的兜底规则（非常重要）：
        - 如果 `title` 为空，不要猜测对方职称，不要写“主任/副主任/主治”等具体身份；
        - 如果 `industry` 为空，不要硬写具体学科方向，改用“临床研究”“医学科研”“论文发表”“学术写作”等更自然的泛化表达；
        - 如果 `company` 信息有限，就用“贵院”“您所在团队”等自然称呼替代；
        - 全文不要暴露“字段缺失”这件事，不要出现明显拼接痕迹。

        输出要求（严格遵守）：
        1) 开头必须是“{name}医生，您好：”；
        2) 正文约180-260字，分3-4段；
        3) 语气真诚、亲切、专业、有温度，不夸张承诺；
        4) 禁止出现“包发表/保证录用”等表述；
        5) 避免明显营销口号，避免“最后机会”“限时”等销售化措辞；
        6) 每次生成时请换一种自然表达，避免重复套话；
        7) 只输出邮件正文，不要解释，不要出现占位符。

      # 说明：当 AI 失败或超时时，使用这段正文兜底发送。
      fallback_body_template: |
        {name}医生，您好：

        一直比较关注医院医生在临床研究和论文发表方面的实际需求，也看到不少老师在科研写作、返修回复和投稿节奏上花了很多时间。

        我们近期协助了一位同级别三甲医院的医生，将一篇曾被拒稿3次的临床回顾性文章，经过润色和修回，2个月内被3分+的SCI期刊接收。

        我把这份【拒稿逆袭的投稿全过程及审稿回复信】做成了案例复盘。如果您手头正好有积压的数据或被拒的稿子，这个案例或许能给您一些回复审稿人的灵感。

        若您方便，欢迎直接回复本邮件，我可以把案例发您参考。

        {sender_name}
        {sender_email}

      # 邮件正文类型：plain / html
      content_subtype: "plain"

      # 可选：附件路径列表（支持相对路径或绝对路径）。
      # 例如可放联系方式图片，发送时会作为附件一并发出。
      attachment_paths: []

      # 可选：图片路径列表（兼容字段名）。
      # 会按普通附件发送，不会插入正文末尾。
      inline_image_paths: []

    - id: "follow_up"
      # 同样作为 AI 标题参考与兜底标题。
      subject_template: "{name}老师，给您准备了一份2026下半年SCI选刊白名单"

      prompt_template: |
        请你以“医学论文服务顾问”的身份，写一封中文跟进邮件正文。
        收件人姓名：{name}
        所在单位：{company}
        职位：{title}
        学科/研究方向：{industry}
        上次联系时间：{last_contact_date}
        我方联系人：{sender_name} ({sender_email})

        核心信息（必须覆盖）：
        - 开头使用“{name}老师，您好：”；
        - 提及近期很多{industry}方向医生在准备职称论文，且期刊审稿周期变长；
        - 说明你整理了一份“《2026年下半年医学各科室审稿快、易录用的SCI期刊白名单（附版面费及影响因子）》”；
        - 说明文件为Excel格式、内容详细；
        - 引导对方如近期有发表计划，可加微信领取资料。

        输出要求（严格遵守）：
        1) 170-240字，3-4段；
        2) 语气专业、友好、克制，不夸张承诺；
        3) 禁止出现“包发表/保证录用”等表述；
        4) 只输出邮件正文，不要解释，不要出现占位符。

      fallback_body_template: |
        {name}老师，您好：

        最近看到很多{industry}方向的医生在准备职称论文，但不少期刊的审稿周期都在变长。

        我花了一周时间，专门剔除了最新的“预警期刊”，整理了一份《2026年下半年医学各科室审稿快、易录用的SCI期刊白名单（附版面费及影响因子）》。

        这份资料是Excel格式，内容比较详细。如果您近期有发表计划，可以加我微信，我直接发给您备用，希望能帮您节省选刊时间。

        {sender_name}
        {sender_email}

      content_subtype: "plain"

      # 可选：附件路径列表。
      attachment_paths: []

      # 可选：图片路径列表（兼容字段名），按普通附件发送。
      inline_image_paths: []

ai:
  # 是否启用 AI 生成标题和正文。
  enabled: true

  # 是否读取本机 Codex 配置（~/.codex/config.toml 与 auth.json）。
  use_local_codex: true

  # 本机 Codex 配置目录。
  local_codex_home: "~/.codex"

  # AI 调用方式：
  # openai_compatible = 直接请求 OpenAI 兼容接口
  # codex_cli = 直接调用本机 `codex exec`
  provider: "codex_cli"

  # 仅在 codex_cli 模式下有效；用于覆盖全局 Codex 推理强度。
  # 可选：low / medium / high / xhigh
  reasoning_effort: "low"

  # OpenAI 兼容接口风格：
  # chat_completions = POST {base_url}/chat/completions
  # responses = POST {base_url}/responses
  # 当 provider=codex_cli 时，这里可留空。
  api_style: ""

  # OpenAI 兼容接口地址；provider=codex_cli 时可留空。
  base_url: ""

  # OpenAI 兼容接口密钥；provider=codex_cli 时可留空。
  api_key: ""

  # 模型名；如果 use_local_codex=true 且此处留空，则自动从本机 Codex 配置读取。
  model: ""

  # 全局系统提示词。
  system_prompt: |
    你是一名专业的企业商务邮件助手。请严格按要求生成中文邮件正文。

  # 采样温度，值越高越发散，值越低越稳定。
  temperature: 0.7

  # 最大输出 token。
  max_tokens: 500

  # AI 请求超时时间（秒）；codex_cli 模式推荐 >= 60，建议 120。
  timeout_seconds: 120

  # AI 调用失败后的重试次数。
  retries: 2

  # AI 重试退避基础时长（秒）。
  retry_backoff_seconds: 2
