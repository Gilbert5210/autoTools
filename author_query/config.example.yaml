# 配置说明：
# - 真实使用时建议复制本文件为 config.yaml
# - 账号密码请通过环境变量注入（支持 ${ENV_VAR}）

global:
  headless: true
  concurrency: 3
  site_worker_concurrency: 3
  site_concurrency:
    cbkx_whu: 3

  # 浏览器内核策略（默认优先本机 Chrome）
  browser:
    prefer_local_chrome: true
    channel: "chrome"
    executable_path: ""
    fallback_to_playwright_chromium: true

  # 验证码识别
  captcha:
    expected_digits: 5
    ocr_max_attempts: 6
    submit_max_attempts: 4
    refresh_delay_ms: 250
    post_submit_timeout_ms: 10000
    post_submit_poll_interval_ms: 350

  # 查询通道：
  # - auto: 优先走接口请求，失败时回退页面点击
  # - api: 仅接口请求（不回退）
  # - ui: 仅页面点击（历史模式）
  query:
    mode: auto
    http_timeout_ms: 25000
    name_poll_interval_ms: 200

  # 相似名生成
  similar_names:
    enabled: false
    max_variants: 10
    replace_map:
      "壮": ["壮", "庄", "状", "装"]
      "婷": ["婷", "亭", "庭"]
      "伟": ["伟", "炜", "玮"]
      "强": ["强", "墙", "抢"]
      "敏": ["敏", "闵", "岷"]
      "磊": ["磊", "蕾", "垒"]

  # 输出文件（默认写到 autoTools 目录）
  output:
    user_list_md: "../userList.md"
    failed_md: "../failed_names.md"
    skipped_md: "../skipped_names.md"
    jsonl: "../userList.jsonl"
    write_jsonl: true

  timeouts_ms:
    navigation: 25000
    selector: 12000
    result: 20000

inputs:
  names_file: "./names.txt"

sites:
  - name: "cbkx_whu"
    query_mode: auto
    # 可选：登录成功 URL 强信号（cbkx 默认会使用 /author/Author.action）
    login_success_url_contains: "/author/Author.action"
    # 可选：是否允许原始 form.submit() 兜底（cbkx 默认 false）
    allow_raw_form_submit: false
    login_url: "https://cbkx.whu.edu.cn/Journalx_cbkx/authorLogOn.action"
    create_urls:
      - "https://cbkx.whu.edu.cn/Journalx_cbkx/author/Contribution!create22.action?id=16159677204&flag=0&processId=1159659809"

    credentials:
      username: "${CBKX_USER}"
      password: "${CBKX_PASS}"

    selectors:
      username: "#user_name"
      password: "#password"
      submit: "input[type='submit'], button[type='submit'], input[value*='登录'], button:has-text('登录')"
      name_input: "#personSearch\\.name"
      captcha_input: "#randomCode"
      captcha_image: "#randomCodePic"
      search_button: "input[value='添加作者']"
      result_table: "table.list"
      # 可选：结果页行标记（cbkx 默认就是 sid 单选框）
      result_row_marker: "input[type='radio'][name='sid']"
